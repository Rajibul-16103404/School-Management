# ====================================================================
# Nginx URL Rewrite Configuration (pseudo-static)
# ====================================================================
# If you are hosting on aaPanel with Nginx, copy and paste this code 
# into the "URL rewrite" (pseudo-static) settings panel for your website.
#
# IMPORTANT: If the browser URL changes but the page content remains 
# stuck on the Homepage, it means you are using a Single Page App (SPA)
# rewrite rule (e.g. Laravel or WordPress default) which forwards all 
# traffic to index.php. 
#
# Replace any existing rules with one of the following options:
# ====================================================================

# Option 1: Clean PHP File Routing (Recommended)
location / {
    try_files $uri $uri/ @clean_urls;
}

location @clean_urls {
    rewrite ^/(.*)/?$ /$1.php last;
}

# --------------------------------------------------------------------
# Option 2: Alternate Try-Files Direct Routing (Use if Option 1 fails)
# --------------------------------------------------------------------
# location / {
#     try_files $uri $uri/ $uri.php$is_args$args;
# }
